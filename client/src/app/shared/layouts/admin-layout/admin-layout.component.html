<div class="container">
  <div class="sidebar" role="banner">
    <div class="logo-container">
      <img src="../assets/images/logo.png" alt="logo">
      <h1 class="title">
        Hotel Management
      </h1>
    </div>

      <hr>

      <div class="user">
          <p>{{user.user}}</p>
          <p class="post">"{{post.toLowerCase()}}"</p>
      </div>

      <hr class="hr-bottom">

    <div class="nav-wrap">
      <nav class="main-nav" role="navigation">
        <ul class="list-hover-slide">
          <li><a routerLink="/admin-panel/hotels">Гостиницы</a></li>
          <li><a routerLink="/admin-panel/houses">Дома</a></li>
          <li><a routerLink="/admin-panel/users">Сотрудники</a></li>
          <li (click)="logout()"><a>Выйти</a></li>
        </ul>
<!--          <div class="date">-->
<!--              <p>{{date | date: 'd.MM.YYYY'}}</p>-->
<!--              <p>{{date | date: 'hh : mm'}}</p>-->
<!--          </div>-->
      </nav>
    </div>
  </div>

  <div class="toggle-admin-checked">
    <p>Режим администратора</p>
    <mat-slide-toggle color="warn" [checked]="true" (click)="selectMode()"></mat-slide-toggle>
  </div>

  <div class="container-right">
    <div class="container-right-title">
    </div>
    <router-outlet></router-outlet>
  </div>
</div>
