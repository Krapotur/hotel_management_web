<div [class]="isShowTemplate ? 'blur': ''">
  <div class="mat-elevation-z8">
    <h1>Должности</h1>
    <hr>
    <table mat-table [dataSource]="dataSource" *ngIf="!isEmptyPosts">

      <!-- Position Column -->
      <ng-container matColumnDef="#">
        <th mat-header-cell *matHeaderCellDef> #</th>
        <td mat-cell *matCellDef="let element">{{ element.position }}</td>
      </ng-container>

      <!-- Post Column -->
      <ng-container matColumnDef="post">
        <th mat-header-cell *matHeaderCellDef> Название</th>
        <td mat-cell *matCellDef="let element"> {{ element.title }}</td>
      </ng-container>

      <!-- Action Column -->
      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef> Действие</th>
        <td mat-cell *matCellDef="let element">
          <img style="width: 35px"
               src="../assets/icons/edit.png"
               alt="edit"
               (click)="changeTemplate('edit', element)"
          >
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <div *ngIf="isEmptyPosts" class="empty-block">
      <p>Добавьте первую должность...</p>
    </div>

    <hr>
    <div class="table-bottom">
      <button
        class="btn" extended="" mat-fab
        (click)="changeTemplate('add')"
        [disabled]="isShowTemplate"
      >
        Добавить
      </button>
    </div>
  </div>

</div>
<!--Form-->
<div class="container" *ngIf="isShowTemplate">
  <h2>{{ titleForm }}</h2>
  <h3>{{ titlePost }}</h3>
  <form [formGroup]="form">
    <div class="input-block" *ngIf="!isDelete">
      <div>
        <mat-form-field class="input-single">
          <mat-label>Название</mat-label>
          <input type="text" matInput formControlName="title">
          <mat-hint
            *ngIf="form.get('title').hasError('required') && form.get('title').touched"
          >Введите название должности
          </mat-hint>
        </mat-form-field>
      </div>

      <div>
        <img
          *ngIf="isEdit"
          (click)="changeTemplate('delete')"
          src="../assets/icons/delete.png" alt="delete">
      </div>
    </div>

    <div class="btn-group">
      <button
        class="btn-cancel" extended="" mat-fab
        (click)="changeTemplate('')"
      >
        {{ isDelete ? 'Нет' : 'Отмена' }}
      </button>
      <button
        type="submit"
        class="btn-save" extended="" mat-fab
        (click)="isDelete ? delete() : onSubmit()"
      >
        {{ isDelete ? 'Да' : 'Сохранить' }}
      </button>
    </div>
  </form>
</div>
