<div class="container">
  <h3>Новая гостиница</h3>
  <hr>
  <form [formGroup]="form">
    <div class="container-form">

      <mat-form-field>
        <mat-label>Название</mat-label>
        <input type="text" matInput formControlName="title">
        <mat-hint
          *ngIf="form.get('title').hasError('required') && form.get('title').touched"
        >Введите название гостиницы
        </mat-hint>
      </mat-form-field>

      <mat-form-field>
        <mat-label>Кол-во этажей(с номерами)</mat-label>
        <input type="number" matInput formControlName="floors" #inputFloors
               min="1" max="4"
               placeholder="1-4"
               (keyup)="checkQuantityFloors(Number(inputFloors.value))">
        <mat-hint
          *ngIf="form.get('floors').hasError('required') && form.get('floors').touched"
        >Введите количество этажей с наличием номеров
        </mat-hint>
        <mat-hint
          *ngIf="form.get('floors').hasError('min') || form.get('floors').hasError('max')"
        >Укажите количество этажей(с наличием номеров) в диапазоне от 1 - 4
        </mat-hint>
      </mat-form-field>
      <div class="input-floors" *ngFor="let item of floors">
        <span>{{item}}) </span>

        <div [class]="form.get('floor' + item).hasError('required')
                          && form.get('floor' + item).touched
                          ? 'error-input': ''">
          <input type="number"
                 min="1" max="4"
                 (keyup)="setValueInInputFloors()"
                 (blur)="checkRooms('startRoom'+ item, 'endRoom' + item, 'floor' + item)"
                 formControlName="floor{{item}}">
        </div>
        <span>этаж, c </span>
        <div class="input-rooms">
          <div [class]="form.get('startRoom' + item).hasError('required')
                          && form.get('startRoom' + item).touched
                          ? 'error-input': ''">
            <input type="number" min="1" max="500"
                   formControlName="startRoom{{item}}"
            >
          </div>

        </div>
        <span> по </span>
        <div class="input-rooms">

          <div [class]="form.get('endRoom' + item).hasError('required') &&
            form.get('endRoom' + item).touched
             ? 'error-input': ''">
            <input type="number" min="1" max="500"
                   (blur)="checkRooms('startRoom'+ item, 'endRoom' + item, 'floor' + item)"
                   formControlName="endRoom{{item}}"
            >
          </div>

        </div>
      </div>
    </div>

    <span *ngIf="errorRequired" class="error-span">Заполните обязательные поля с номерами*</span>

    <div class="btn-group">
      <button
        class="btn-cancel" extended="" mat-fab>
        <!--          (click)="openTemplate('')"-->
        <!--        >-->
        Отмена
      </button>
      <button
        type="submit"
        class="btn-save" extended="" mat-fab
      >
        Сохранить
      </button>
    </div>
  </form>
</div>
